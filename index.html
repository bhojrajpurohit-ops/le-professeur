<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Le Professeur — Complete French Course</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0c0f1a;--bg2:#141829;--card:#1a1f35;--card2:#222840;--bd:#2a3050;
--tx:#eef0f6;--tx2:#8890a8;--tx3:#555d78;
--gold:#fbbf24;--green:#34d399;--blue:#60a5fa;--pink:#f472b6;--red:#f87171;--purple:#a78bfa;--teal:#2dd4bf;--orange:#fb923c;
--f1:'Plus Jakarta Sans',system-ui,sans-serif;--f2:'Fraunces',Georgia,serif;
}
html{background:var(--bg);color:var(--tx)}
body{font-family:var(--f1);min-height:100vh;padding-bottom:72px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:8px}
img{max-width:100%;display:block;border-radius:14px}

.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bd);display:flex;z-index:999;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bnav button{flex:1;background:none;border:none;font-family:var(--f1);font-size:10px;font-weight:700;color:var(--tx3);cursor:pointer;padding:6px 0;display:flex;flex-direction:column;align-items:center;gap:3px}
.bnav button.on{color:var(--gold)}
.bnav .ic{font-size:20px}

.ctr{max-width:520px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:14px;border:1px solid var(--bd)}

/* Hero with image */
.hero{position:relative;border-radius:20px;overflow:hidden;margin-bottom:16px}
.hero img{width:100%;height:200px;object-fit:cover}
.hero .ov{position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(0,0,0,.8));display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
.hero .ov h2{font-family:var(--f2);font-size:24px;color:#fff}
.hero .ov p{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px}

/* Level cards */
.lvc{border-radius:18px;padding:22px;margin-bottom:12px;cursor:pointer;position:relative;overflow:hidden;transition:.2s;border:1px solid transparent}
.lvc:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.1)}
.lvc h3{font-family:var(--f2);font-size:20px;color:#fff;position:relative;z-index:1}
.lvc p{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;position:relative;z-index:1}
.lvc .bg-img{position:absolute;inset:0;opacity:.3}
.lvc .bg-img img{width:100%;height:100%;object-fit:cover}
.lvc .badge{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;color:#fff;z-index:1}
.lvc .pb{height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin-top:12px;position:relative;z-index:1}
.lvc .pf{height:100%;background:#fff;border-radius:3px;transition:width .5s}

/* Stats */
.stats{display:flex;gap:8px;margin-bottom:16px}
.stat{flex:1;background:var(--card);border-radius:16px;padding:14px 10px;text-align:center;border:1px solid var(--bd)}
.stat .n{font-size:20px;font-weight:900}
.stat .l{font-size:10px;color:var(--tx2);margin-top:2px;font-weight:600}

/* Unit card */
.uc{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border:1px solid var(--bd);border-radius:16px;margin-bottom:8px;cursor:pointer;transition:.15s}
.uc:hover{border-color:var(--blue);transform:translateY(-1px)}
.uc.done{border-color:var(--green);background:rgba(52,211,153,.08)}
.uc-n{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0;color:#fff}
.uc-i{flex:1;min-width:0}
.uc-i h4{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uc-i p{font-size:12px;color:var(--tx2);margin-top:2px}

/* Tabs */
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:14px;padding:3px;margin-bottom:16px}
.tabs button{flex:1;padding:11px;border:none;border-radius:12px;font-family:var(--f1);font-size:13px;font-weight:700;cursor:pointer;background:none;color:var(--tx3)}
.tabs button.on{background:var(--card);color:var(--gold)}

/* Vocab */
.vr{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;margin-bottom:5px;cursor:pointer;transition:.15s;background:var(--card2);border:1px solid transparent}
.vr:hover{border-color:var(--blue)}
.vr:active{transform:scale(.98)}
.vr .fr{font-size:15px;font-weight:700}
.vr .en{font-size:12px;color:var(--tx2)}
.vr .tip{font-size:11px;color:var(--gold);margin-top:2px}

/* Grammar */
.gram{background:linear-gradient(135deg,rgba(96,165,250,.1),rgba(167,139,250,.1));border:1px solid rgba(96,165,250,.2);border-radius:16px;padding:18px;margin-bottom:14px;font-size:14px;line-height:1.85}
.gram b{color:var(--blue)}

/* Culture */
.cult{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(251,146,60,.1));border:1px solid rgba(251,191,36,.2);border-radius:16px;padding:16px;margin-bottom:14px}
.cult h4{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:6px}
.cult p{font-size:13px;line-height:1.7;color:var(--tx)}

/* Exercise */
.exb{background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:22px;margin-bottom:12px}
.ext{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:10px}
.exq{font-size:22px;font-weight:900;text-align:center;margin:10px 0;line-height:1.3}
.exo{display:block;width:100%;padding:14px 18px;margin-bottom:8px;border-radius:14px;border:2px solid var(--bd);background:var(--card2);font-family:var(--f1);font-size:15px;font-weight:600;color:var(--tx);cursor:pointer;text-align:left;transition:.15s}
.exo:hover{border-color:var(--blue)}
.exo.ok{border-color:var(--green)!important;background:rgba(52,211,153,.15)!important;color:var(--green)!important}
.exo.no{border-color:var(--red)!important;background:rgba(248,113,113,.15)!important;color:var(--red)!important}
.exi{width:100%;padding:14px;border-radius:14px;border:2px solid var(--bd);font-family:var(--f1);font-size:16px;text-align:center;outline:none;background:var(--card2);color:var(--tx)}
.exi:focus{border-color:var(--blue)}
.efb{padding:14px;border-radius:14px;font-weight:700;text-align:center;margin-top:10px}
.efb.ok{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.efb.no{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.pb{height:8px;background:var(--bd);border-radius:4px;overflow:hidden;margin:8px 0}
.pfl{height:100%;border-radius:4px;transition:width .5s}

/* Buttons */
.btn{padding:14px 24px;border:none;border-radius:14px;font-family:var(--f1);font-size:15px;font-weight:800;cursor:pointer;transition:.15s;width:100%;text-align:center;display:block}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#0c0f1a}
.btn-green{background:var(--green);color:#0c0f1a}
.btn-blue{background:var(--blue);color:#0c0f1a}
.btn-out{background:none;border:2px solid var(--bd);color:var(--tx2)}
.btn-sm{padding:10px 16px;font-size:13px;width:auto;display:inline-block}

/* Chat */
.chatb{background:var(--bg);border-radius:14px;padding:12px;min-height:200px;max-height:320px;overflow-y:auto;margin-bottom:10px}
.cm{display:flex;margin-bottom:8px}.cm.me{justify-content:flex-end}
.cb{max-width:82%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.65;white-space:pre-line}
.cb.ai{background:var(--card2);border:1px solid var(--bd);border-bottom-left-radius:4px}
.cb.u{background:var(--blue);color:#0c0f1a;font-weight:600;border-bottom-right-radius:4px}
.crow{display:flex;gap:8px;align-items:center}
.crow input{flex:1;padding:12px 14px;border-radius:12px;border:1px solid var(--bd);font-family:var(--f1);font-size:14px;outline:none;background:var(--card);color:var(--tx)}
.crow input:focus{border-color:var(--blue)}
.mbtn{width:40px;height:40px;border-radius:50%;background:rgba(248,113,113,.15);border:2px solid rgba(248,113,113,.3);color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mbtn.on{background:rgba(248,113,113,.3);border-color:var(--red)}
.sbtn{width:40px;height:40px;border-radius:50%;background:var(--blue);border:none;color:#0c0f1a;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900}
.chips{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.chips button{padding:6px 12px;border-radius:14px;border:1px solid var(--bd);background:var(--card);font-family:var(--f1);font-size:11px;font-weight:700;color:var(--tx2);cursor:pointer}
.chips button:hover{border-color:var(--gold);color:var(--gold)}
.lr{display:flex;gap:4px;justify-content:center;margin-bottom:8px}
.lr button{padding:3px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--card);font-family:var(--f1);font-size:11px;font-weight:700;color:var(--tx2);cursor:pointer}
.lr button.on{border-color:var(--gold);background:rgba(251,191,36,.1);color:var(--gold)}
.bk{background:none;border:none;font-family:var(--f1);font-size:14px;font-weight:700;color:var(--blue);cursor:pointer;padding:0;margin-bottom:14px}

/* Section */
.sec{font-size:11px;font-weight:800;color:var(--tx2);letter-spacing:1.5px;text-transform:uppercase;margin:16px 0 10px}

/* Streaks / Achievements */
.ach{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px}
.ach::-webkit-scrollbar{height:0}
.ach-item{flex-shrink:0;width:60px;text-align:center;padding:10px 4px;border-radius:14px;background:var(--card);border:1px solid var(--bd)}
.ach-item.earned{border-color:var(--gold);background:rgba(251,191,36,.08)}
.ach-item .emoji{font-size:24px}
.ach-item .alabel{font-size:9px;color:var(--tx2);margin-top:4px;font-weight:700}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>
<div class="bnav">
  <button class="on" onclick="go('home')"><span class="ic">🏠</span>Home</button>
  <button onclick="go('practice')"><span class="ic">🎯</span>Practice</button>
  <button onclick="go('tutor')"><span class="ic">💬</span>Tutor</button>
</div>
<script>
// ═══ TTS ═══
let frV=null;(function(){if(!window.speechSynthesis)return;const l=()=>{const v=speechSynthesis.getVoices(),f=v.filter(x=>x.lang.startsWith('fr'));if(f.length)frV=f.find(x=>x.name.includes('Natural'))||f.find(x=>x.name.includes('Google'))||f[0]};l();speechSynthesis.onvoiceschanged=l})();
function say(t,lang,r){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang=lang||'fr-FR';u.rate=r||.85;if((lang||'fr-FR').startsWith('fr')&&frV)u.voice=frV;speechSynthesis.speak(u)}

// ═══ STATE ═══
let S;try{S=JSON.parse(localStorage.getItem('lpX'))||{}}catch(e){S={}}
let xp=S.xp||0,streak=S.stk||1,done=S.done||[],pg='home',cLv=0,cU=null,uTab='lesson',qI=0,qA=[];
let mL='en-US',cM=[{w:'ai',t:'Bonjour! I\'m your French tutor. Ask me anything in English, Hindi, or French!'}];

  paris:'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=600&q=80',

};

// ═══ LEVEL CONFIG ═══
const LG=['linear-gradient(135deg,#059669,#10b981)','linear-gradient(135deg,#0d9488,#14b8a6)','linear-gradient(135deg,#2563eb,#3b82f6)','linear-gradient(135deg,#4338ca,#6366f1)','linear-gradient(135deg,#7c3aed,#8b5cf6)','linear-gradient(135deg,#be123c,#e11d48)'];

// ═══ CURRICULUM — 28 UNITS, 1000+ WORDS ═══
const U=[
// ═══ A1 (8 units) ═══
{lv:0,t:"Greetings & Politeness",img:I.paris,g:"<b>Bonjour</b> = daytime hello. <b>Bonsoir</b> = evening. <b>Salut</b> = casual hi. Always greet before asking anything — skipping is rude in France!",c:"French politeness is serious. You say Bonjour entering any shop, elevator, or interaction. Merci and S'il vous plait in every exchange is expected.",
w:[{f:"Bonjour",e:"Hello",t:"Most important word"},{f:"Bonsoir",e:"Good evening",t:"After 6pm"},{f:"Salut",e:"Hi (casual)",t:"Friends only"},{f:"Au revoir",e:"Goodbye",t:""},{f:"Merci",e:"Thank you",t:""},{f:"Merci beaucoup",e:"Thank you very much",t:""},{f:"S'il vous plait",e:"Please (formal)",t:""},{f:"S'il te plait",e:"Please (casual)",t:""},{f:"De rien",e:"You're welcome",t:""},{f:"Excusez-moi",e:"Excuse me",t:""},{f:"Pardon",e:"Sorry",t:""},{f:"Comment allez-vous?",e:"How are you? (formal)",t:""},{f:"Ca va?",e:"How's it going?",t:""},{f:"Tres bien",e:"Very well",t:""},{f:"Comme ci comme ca",e:"So-so",t:""},{f:"Pas mal",e:"Not bad",t:""},{f:"Bonne journee",e:"Have a good day",t:""},{f:"Bonne soiree",e:"Have a good evening",t:""},{f:"Bonne nuit",e:"Good night",t:""},{f:"A bientot",e:"See you soon",t:""},{f:"A demain",e:"See you tomorrow",t:""},{f:"A plus tard",e:"See you later",t:""},{f:"Bienvenue",e:"Welcome",t:""},{f:"Monsieur",e:"Sir/Mr.",t:""},{f:"Madame",e:"Ma'am/Mrs.",t:""},{f:"Mademoiselle",e:"Miss",t:"Less used now"},{f:"Je vous en prie",e:"You're welcome (formal)",t:""},{f:"Il n'y a pas de quoi",e:"Don't mention it",t:""},{f:"Avec plaisir",e:"With pleasure",t:""},{f:"Enchante(e)",e:"Pleased to meet you",t:""}]},

{lv:0,t:"Introductions & Identity",img:I.family,g:"<b>Je m'appelle</b> = My name is (reflexive verb). Use <b>tu</b> with friends, <b>vous</b> with strangers. Age uses <b>avoir</b>: J'ai 25 ans = I have 25 years.",c:"The tu/vous distinction is crucial. Using tu with a stranger can offend. Always start with vous.",

function R(){

  else if(pg==='unit')a.innerHTML=rU();

    </div>
    ${uTab==='lesson'?`<div class="gram"><b>Grammar:</b><br><br>${u.g}</div><div class="cult"><h4>🌍 Culture</h4><p>${u.c}</p></div><button class="btn btn-green" onclick="cmpU()">✅ Complete (+10 XP)</button>`
    :uTab==='vocab'?`<p style="font-size:12px;color:var(--tx2);margin-bottom:10px">Tap any word to hear it:</p>${u.w.map(w=>`<div class="vr" onclick="say('${w.f.replace(/'/g,"\\'")}')"><span style="font-size:16px">🔊</span><div><div class="fr">${w.f}</div><div class="en">${w.e}</div>${w.t?`<div class="tip">💡 ${w.t}</div>`:''}</div></div>`).join('')}<button class="btn btn-out" style="margin-top:10px" onclick="pA()">🔊 Play All</button>`
    :rQU()}
  </div>`;
}

function cmpU(){const u=U[cU];if(!done.includes(u.t)){done.push(u.t);xp+=10;sv();alert('🎉 +10 XP!')}R()}
async function pA(){for(const w of U[cU].w){say(w.f);await new Promise(r=>setTimeout(r,1500))}}

// ═══ QUIZ ═══
function stQ(){const u=U[cU];if(!u)return;const ws=[...u.w].sort(()=>Math.random()-.5).slice(0,Math.min(10,u.w.length));
qA=ws.map((w,i)=>{if(i%3===0){const o=u.w.filter(x=>x.e!==w.e).sort(()=>Math.random()-.5).slice(0,3);const opts=[w.e,...o.map(x=>x.e)].sort(()=>Math.random()-.5);return{tp:'pick',f:w.f,e:w.e,opts,ans:opts.indexOf(w.e)}}
if(i%3===1)return{tp:'tr',f:w.f,e:w.e};return{tp:'li',f:w.f,e:w.e}});qI=0}

function rQU(){const q=qA[qI];
if(!q)return `<div style="text-align:center;padding:20px"><div style="font-size:48px">🎉</div><h3 style="margin:8px 0">Quiz Done!</h3><button class="btn btn-green" onclick="stQ();R()">Again</button></div>`;
return `<div class="exb">
<div style="font-size:12px;color:var(--tx2);margin-bottom:6px">Q${qI+1}/${qA.length}</div>
<div class="pb"><div class="pfl" style="background:var(--blue);width:${qI/qA.length*100}%"></div></div>
<div class="ext">${q.tp==='pick'?'Choose answer':q.tp==='tr'?'Translate to French':'Listen & type'}</div>
${q.tp==='pick'?`<div class="exq">${q.f}</div><button class="btn-sm btn-out" style="margin:0 auto 12px;display:block" onclick="say('${q.f.replace(/'/g,"\\'")}')">🔊</button>${q.opts.map((o,i)=>`<button class="exo" onclick="cP(this,${i},${q.ans})">${o}</button>`).join('')}`
:q.tp==='tr'?`<div class="exq">${q.e}</div><input class="exi" id="qi" placeholder="French..." onkeydown="if(event.key==='Enter')cTr()"><button class="btn btn-blue btn-sm" style="margin-top:10px" onclick="cTr()">Check</button>`
:`<button class="btn btn-out" onclick="say('${q.f.replace(/'/g,"\\'")}')">🔊 Listen</button><input class="exi" id="qi" style="margin-top:12px" placeholder="Type..." onkeydown="if(event.key==='Enter')cLi()"><button class="btn btn-blue btn-sm" style="margin-top:10px" onclick="cLi()">Check</button>`}
<div id="qf"></div></div>
<button class="btn btn-blue" id="qn" style="display:none" onclick="qI++;R()">Next →</button>`;
}

function sfb(ok,c){document.getElementById('qf').innerHTML=`<div class="efb ${ok?'ok':'no'}">${ok?'✅ Correct! +2 XP':'❌ '+c}</div>`;document.getElementById('qn').style.display='block';if(ok){xp+=2;sv()}}
function cP(b,i,a){document.querySelectorAll('.exo').forEach(x=>x.style.pointerEvents='none');if(i===a)b.classList.add('ok');else{b.classList.add('no');document.querySelectorAll('.exo')[a].classList.add('ok')}sfb(i===a,qA[qI].e)}
function nm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim()}
function cTr(){const i=nm(document.getElementById('qi').value),a=nm(qA[qI].f);sfb(i===a||a.includes(i)||i.includes(a.split(' ')[0]),qA[qI].f)}
function cLi(){const i=nm(document.getElementById('qi').value),a=nm(qA[qI].f),wa=a.split(/\s+/),wi=i.split(/\s+/);let h=0;wa.forEach(w=>{if(wi.some(x=>x===w||w.includes(x)))h++});sfb(h/wa.length>=.5,qA[qI].f)}

// ═══ PRACTICE ═══
function rP(){
  const ld=U.filter(u=>done.includes(u.t));
  if(!ld.length)return `<div class="ctr" style="text-align:center;padding-top:30px"><div style="font-size:48px">📖</div><h3>Complete units first!</h3><p style="color:var(--tx2);margin:8px 0">Finish at least one unit to unlock practice.</p><button class="btn btn-gold" onclick="go('home')">Go to Levels</button></div>`;
  const aw=ld.flatMap(u=>u.w),ws=[...aw].sort(()=>Math.random()-.5).slice(0,10);
  if(!qA.length||pg!=='practice'){qA=ws.map((w,i)=>{const o=aw.filter(x=>x.e!==w.e).sort(()=>Math.random()-.5).slice(0,3);const opts=[w.e,...o.map(x=>x.e)].sort(()=>Math.random()-.5);if(i%3===0)return{tp:'pick',f:w.f,e:w.e,opts,ans:opts.indexOf(w.e)};if(i%3===1)return{tp:'tr',f:w.f,e:w.e};return{tp:'li',f:w.f,e:w.e}});qI=0}
  return `<div class="ctr"><h2 style="font-family:var(--f2);margin-bottom:14px">🎯 Practice</h2><p style="color:var(--tx2);font-size:13px;margin-bottom:16px">Random review from ${ld.length} completed units</p>${rQU()}</div>`;
}

// ═══ TUTOR ═══
function rT(){
  return `<div class="ctr"><h2 style="font-family:var(--f2);margin-bottom:4px">💬 French Tutor</h2><p style="color:var(--tx2);font-size:13px;margin-bottom:10px">English, Hindi, or French</p>
  <div class="lr"><button class="${mL==='en-US'?'on':''}" onclick="mL='en-US';R()">EN</button><button class="${mL==='fr-FR'?'on':''}" onclick="mL='fr-FR';R()">FR</button><button class="${mL==='hi-IN'?'on':''}" onclick="mL='hi-IN';R()">HI</button></div>
  <div class="chatb" id="cb">${cM.map(m=>`<div class="cm ${m.w==='u'?'me':''}"><div class="cb ${m.w==='u'?'u':'ai'}">${m.w==='ai'?'<b style="color:var(--gold);font-size:11px">Professeur</b><br>':''}${m.t.replace(/\n/g,'<br>')}</div></div>`).join('')}</div>
  <div class="chips">${['Teach me','Order coffee','Numbers','Pronunciation','Quiz me','Grammar'].map(c=>`<button onclick="sC('${c}')">${c}</button>`).join('')}</div>
  <div class="crow"><button class="mbtn" id="mic" onclick="tM()">🎤</button><input id="ci" placeholder="Type here..." onkeydown="if(event.key==='Enter')sC()"><button class="sbtn" onclick="sC()">→</button></div>
  </div>`;
}

function rp(t){const l=t.toLowerCase().trim(),h=/[\u0900-\u097F]/.test(t),aW=U.flatMap(u=>u.w),rw=()=>aW[Math.floor(Math.random()*aW.length)];
if(h){const w=rw();say(w.f);return `Hindi samajhta hoon!\n"${w.f}" = "${w.e}"${w.t?'\n'+w.t:''}\nTry it!`}
if(l.match(/^(hi|hello|hey)$/)){say('Bonjour');return `"Bonjour" = Hello!\n"Bonsoir" = Evening\n"Salut" = Hi (casual)`}
if(l.includes('how are you')){say('Comment ca va');return `"Comment allez-vous?" (formal)\n"Ca va?" (casual)\nResponse: "Tres bien!"`}
if(l.includes('thank')){say('Merci');return `"Merci" = Thanks\n"Merci beaucoup" = Thanks a lot\n"De rien" = You're welcome`}
if(l.includes('order')||l.includes('coffee')||l.includes('cafe')){say('Je voudrais un cafe');return `"Je voudrais un cafe" = I'd like a coffee\n"S'il vous plait" = Please\n"L'addition" = The bill`}
if(l.includes('number')||l.includes('count')){say('un, deux, trois');return `1=un 2=deux 3=trois 4=quatre 5=cinq\n6=six 7=sept 8=huit 9=neuf 10=dix\n\n70=soixante-dix (60+10)!`}
if(l.includes('teach')||l.includes('word')||l.includes('learn')){const w=rw();say(w.f);return `"${w.f}" = "${w.e}"${w.t?'\n'+w.t:''}\nSay it aloud!`}
if(l.includes('how do i say')||l.includes('translate')){const m=l.replace(/how do i say|translate|in french|\?/g,'').trim();const f=aW.find(w=>w.e.toLowerCase().includes(m));if(f){say(f.f);return `"${f.e}" = "${f.f}"`}const w=rw();say(w.f);return `Here's one:\n"${w.f}" = "${w.e}"`}
if(l.includes('pronounc')||l.includes('sound')){return `R = throat (gentle gargle)\nU = say 'ee' with round lips\nNasal: air through nose\nSilent final consonants!\nSay a word to practice!`}
if(l.includes('grammar')){return `Key points:\n- Nouns have gender (le/la)\n- Adjectives after nouns\n- 3 verb groups: -er,-ir,-re\n- Negation: ne...pas\nWhat topic?`}
if(l.includes('help')||l.includes('confused')){const w=U[0].w[0];say(w.f);return `Start here:\n"${w.f}" = "${w.e}"\n\nTry: "Teach me" or "Quiz me"`}
if(l.includes('quiz')){const w=rw();say(w.f);return `What does "${w.f}" mean?\nType your answer!`}
if(l.includes('bonjour')||l.includes('merci')||l.includes('salut')||l.includes('oui')){say('Tres bien');const w=rw();return `Tres bien! Next:\n"${w.f}" = "${w.e}"`}
if(l==='yes'||l==='ok'||l==='oui'){const w=rw();say(w.f);return `"${w.f}" = "${w.e}"`}
for(const w of aW)if(l.includes(w.e.toLowerCase().split('/')[0].trim().split('(')[0].trim())&&w.e.length>2){say(w.f);return `Yes! "${w.f}" = "${w.e}" ✓`}
const w=rw();say(w.f);return `"${w.f}" = "${w.e}"${w.t?'\n'+w.t:''}\nTry it!`}

function sC(o){const inp=document.getElementById('ci');const t=o||inp?.value?.trim();if(!t)return;if(inp)inp.value='';
cM.push({w:'u',t});setTimeout(()=>{cM.push({w:'ai',t:rp(t)});R();const cb=document.getElementById('cb');if(cb)cb.scrollTop=cb.scrollHeight},500);
R();const cb=document.getElementById('cb');if(cb)cb.scrollTop=cb.scrollHeight}

let isL=false;function tM(){const b=document.getElementById('mic');if(isL){b.classList.remove('on');isL=false;return}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Voice needs Chrome');return}
const r=new SR();r.lang=mL;r.start();b.classList.add('on');isL=true;
r.onresult=e=>{const ci=document.getElementById('ci');if(ci)ci.value=e.results[0][0].transcript;sC();b.classList.remove('on');isL=false};
r.onend=()=>{b.classList.remove('on');isL=false};r.onerror=()=>{b.classList.remove('on');isL=false}}

R();
</script>
</body>
</html>
